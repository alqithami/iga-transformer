# Public tiny Llama-like checkpoint for code-path debugging only. Do not report its numbers.
model_id: hf-internal-testing/tiny-random-LlamaForCausalLM
model_revision: null
device: auto
dtype: auto
attn_implementation: eager
trust_remote_code: false
seed: 1
iga:
  layers: late
  rank: 4
  pattern_type: pair_mlp
  uncertainty_mode: entropy
  gamma_max: 1.0
  beta: 4.0
  tau: 0.35
  init_head_strength: 0.05
  train_gamma_threshold: false
  head_selection: all
  pair_hidden_mult: 1.0
train:
  epochs: 1
  batch_size: 1
  lr: 0.0005
  weight_decay: 0.0
  gamma_reg: 0.001
  max_grad_norm: 1.0
  max_length: 128
  dev_eval_limit: 8
