model_id: meta-llama/Meta-Llama-3-8B-Instruct
model_revision: null
device: auto
dtype: float16
attn_implementation: eager
trust_remote_code: false
seed: 1
iga:
  # Paper-aligned default: nonnegative pairwise f_theta over low-rank q/k features.
  layers: late
  rank: 16
  pattern_type: pair_mlp
  uncertainty_mode: entropy
  gamma_max: 2.0
  beta: 8.0
  tau: 0.35
  init_head_strength: 0.05
  train_gamma_threshold: false
  head_selection: all
  pair_hidden_mult: 2.0
train:
  epochs: 1
  batch_size: 1
  lr: 0.0002
  weight_decay: 0.0
  gamma_reg: 0.001
  max_grad_norm: 1.0
  max_length: 768
  dev_eval_limit: 64
